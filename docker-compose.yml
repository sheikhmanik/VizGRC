services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    command: ["sh", "-c", "npm install && npm run dev"]
  
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "npx prisma generate && npx prisma migrate deploy && node dist/server.js"]

    # Development command (above is for production)
    # command: ["sh", "-c", "npx prisma generate && npx prisma migrate deploy && npm run dev"]

  db:
    image: postgres:15
    container_name: vizgrc_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: vizgrc
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: